apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: default
spec:
  selector:
    app: demo-voting-app
    name: db-pod
  type: ClusterIP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - port: 5432
    targetPort: 5432