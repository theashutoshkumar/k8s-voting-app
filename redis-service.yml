apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
  labels:
    name: redis-service
    app: demo-voting-app
spec:
  selector:
    app: demo-voting-app
    name: redis-pod
  type: ClusterIP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - port: 6379
    targetPort: 6379
    